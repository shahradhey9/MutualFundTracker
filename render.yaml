services:
  - type: web
    name: gwt-backend
    runtime: node
    rootDir: backend
    region: singapore
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true

  - type: web
    name: gwt-frontend
    runtime: static
    rootDir: frontend
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
