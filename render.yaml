databases:
  - name: gwt-db
    databaseName: gwt_db
    user: gwt_user
    region: singapore
    plan: free

services:
  # ── ASP.NET Core backend (Docker) ──────────────────────────────────────────
  - type: web
    name: gwt-backend
    runtime: docker
    rootDir: backend-dotnet
    dockerfilePath: Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

      # PostgreSQL — auto-wired from the database defined above
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: gwt-db
          property: connectionString

      # Redis not available on free tier; app degrades gracefully without it
      - key: ConnectionStrings__Redis
        value: "localhost:6379,abortConnect=false"

      # JWT — secret auto-generated by Render on first deploy
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: gwt-api
      - key: Jwt__Audience
        value: gwt-client
      - key: Jwt__ExpiryDays
        value: "7"

      - key: AdminKey
        generateValue: true

      # CORS — allow the Render-hosted frontend
      - key: AllowedOrigins__0
        value: https://gwt-frontend-wklj.onrender.com

  # ── React / Vite frontend (static site) ────────────────────────────────────
  - type: web
    name: gwt-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # index.html must never be cached — it references hashed JS/CSS bundles
      # that change on every deploy. A stale index.html loads old (missing) assets.
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /index.html
        name: Pragma
        value: no-cache
      - path: /index.html
        name: Expires
        value: "0"
      # Hashed JS/CSS assets are content-addressed and safe to cache permanently.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      # Fill in after gwt-backend is deployed.
      # Example value: https://gwt-backend.onrender.com/api
      - key: VITE_API_URL
        sync: false
